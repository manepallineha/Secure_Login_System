<!DOCTYPE html>
<html>
<head>
    <title>SecureVault - Register</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            padding:35px;
            border-radius:15px;
            width:350px;
            text-align:center;
            box-shadow:0 0 25px rgba(59,130,246,0.4);
        }

        h1{
            margin-bottom:5px;
        }

        p{
            color:#cbd5e1;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#3b82f6;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#2563eb;
        }

        a{
            color:#60a5fa;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🛡️ SecureVault</h1>
    <p>Create your secure account</p>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>

    <small>Cyber Security Internship Project</small>
</div>

</body>
</html>
