<!DOCTYPE html>
<html>
<head>
    <title>SecureVault - Login</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#020617,#0f172a);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            width:360px;
            padding:35px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 25px rgba(34,211,238,0.4);
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#22c55e;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#16a34a;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

        .tag{
            color:#94a3b8;
            font-size:13px;
        }
    </style>

</head>

<body>

<div class="card">

    <h1>🔐 SecureVault</h1>

    <p>Secure Authentication Portal</p>

    <form method="POST">

        <input type="text"
        name="username"
        placeholder="Username"
        required>

        <input type="password"
        name="password"
        placeholder="Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New User?
        <a href="/register">Register</a>
    </p>

    <p class="tag">
        Protected by bcrypt encryption
    </p>

</div>

</body>
</html>
